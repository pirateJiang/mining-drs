[pytest]
testpaths = tests
pythonpath = . examples/mining
python_files = test_*.py *_test.py
python_functions = test_*
addopts =
    --import-mode=importlib
    --cov=drs --cov=components --cov=rl
    --cov-fail-under=90
    --ignore=tests/performance
markers =
    unit: Fast, isolated logic checks.
    integration: Component interaction and multi-module behavior checks.
    smoke: Execution loop checks.
    regression: Dedicated regression checks.
    performance: Marks tests as throughput/efficiency benchmarks.
